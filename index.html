.logo{

transition:0.25s ease;
}

.link:hover{

backdrop-filter: blur(10px);
}

.copy-btn:hover{
background:rgba(168,85,247,0.3);
transform:scale(1.08);
}

.copy-btn img{
width:20px;
height:20px;
opacity:0.9;
